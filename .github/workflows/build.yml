name: Build

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'

  push:
    branches:
      - main
    tags:   # tags are supported with push events, but not alone or with pull_request events!
      - 'v[0-9]+.[0-9]+.[0-9]+'
    paths:
      - 'src/**'

permissions:
  contents: write

jobs:
  test_matrix:
    name: test across multiple Node.js versions
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: ['18.x', '20.x', '22.x']

    defaults:
      run:
        working-directory: src/backend

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache Node Modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
      
      - name: Install Dependencies (only if cache miss)
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci || npm install

      - name: run tests
        run: npm test
# -------------------------------------------------------------------------------
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      # If you wish to fail your job when the Quality Gate is red, uncomment the
      # following lines. This would typically be used to fail a deployment.
      # - uses: SonarSource/sonarqube-quality-gate-action@v1
      #   timeout-minutes: 5
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
# -------------------------------------------------------------------------------
  simulate_deployment:
    name: Simulate Production Deployment
    runs-on: ubuntu-latest
    # needs: [test_matrix, build]  # Depends on both jobs passing / commented cuz ngrok out of free limit!
    needs: test_matrix
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Build Backend
        working-directory: src/backend
        run: npm ci || npm install
# -------------------------------------------------------------------------------
  create_release:
    name: create release
    runs-on: ubuntu-latest
    needs: simulate_deployment
    # Only run when a version tag is pushed (e.g., v1.0.0)
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: auto generate release notes
        id: release_notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges -10)
          
          # write to file..
          echo "$CHANGES" > release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: release ${{ steps.version.outputs.version }}
          body_path: release_notes.txt
          generate_release_notes: true
